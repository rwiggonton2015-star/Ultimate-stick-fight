<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Stick Fight</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div id="playerHealth">Health: <span id="healthValue">100</span></div>
            <div id="score">Score: <span id="scoreValue">0</span></div>
        </div>
    </div>

    <!-- Mobile Controls -->
    <div id="mobileControls" class="hidden">
        <button id="leftBtn" class="control-btn">◀</button>
        <button id="rightBtn" class="control-btn">▶</button>
        <button id="jumpBtn" class="control-btn">JUMP</button>
        <button id="attackBtn" class="control-btn attack">ATTACK</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
